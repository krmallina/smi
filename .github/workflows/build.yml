name: Update Dashboard
on:
  schedule:
    # 4 AM - 4 PM PST on Weekdays (Monday-Friday) - every 30 minutes
    # UTC is +8 hours: 12:00 PM to 12:00 AM. 
    # '1-6' covers the Friday afternoon PST run which occurs on Saturday UTC.
    - cron: '0,30 0,12-23 * * 1-6'
  workflow_dispatch: 
permissions:
  contents: write
jobs:
  run-script:
    runs-on: ubuntu-latest
    # This prevents multiple versions of this job from running at the exact same time
    concurrency:
      group: stock-update
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install yfinance pandas requests; fi
      - name: Run stocks.py
        run: python stocks.py & python stocksED.py
      - name: Sync and Push Changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only add the dashboard HTML files, not the workflow
          git add data/*.html
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git commit -m "Update dashboards $(date -u)"
          
          # STRATEGY: Always force push dashboard changes (they're generated data, not source code)
          for i in {1..5}; do
            echo "Attempt $i: Pushing..."
            
            # Fetch latest to update remote tracking
            git fetch origin main
            
            # Force push our dashboard changes (last write wins)
            if git push --force-with-lease origin main; then
              echo "Successfully pushed changes"
              break
            else
              echo "Push failed, retrying in 5s..."
              sleep 5
            fi
          done
