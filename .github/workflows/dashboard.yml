name: Update Dashboard

on:
  schedule:
    # -------------------------------------------------------------------------
    # PST to UTC Conversion (PST is UTC-8):
    # 4 AM PST  -> 12:00 PM UTC
    # 3 PM PST  -> 11:00 PM UTC
    # 4 PM PST  -> 12:00 AM UTC (Next Day)
    #
    # '1-6' (Mon-Sat UTC) ensures we catch Friday afternoon PST (which is Sat UTC).
    # -------------------------------------------------------------------------
    - cron: '0 0,12-23 * * 1-6'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # IMPORTANT: Fetches all history so rebase works

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install yfinance pandas requests; fi

      - name: Run stocks.py
        run: python stocks.py --refresh 30

      - name: Sync and Push Changes
        if: success()
        run: |
          # Configure Git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the updated HTML files
          git add data/*.html
          
          # Check if there are changes; if not, exit cleanly
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          # Create the local commit
          git commit -m "Update dashboards $(date -u)"

          # THE FIX: REBASE RETRY LOOP
          # We pull the latest changes and put our commit on top.
          # '-X ours' means if there's a conflict, keep the dashboard we just generated.
          for i in {1..5}; do
            echo "Attempt $i: Pulling latest and pushing..."
            git pull --rebase -X ours origin main && git push origin main && break || \
            (echo "Conflict detected, retrying in 5s..." && sleep 5)
          done
