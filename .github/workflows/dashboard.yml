name: Update Stock Dashboard

on:
  schedule:
    - cron: '0 0,12-23 * * *'   # Every hour 4 AM – 4 PM PST (daily)
    # - cron: '0 0,12-23 * * 1-5'  # Uncomment this line instead for weekdays only
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  # Or whatever version you use

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests

      - name: Run stocks.py
        run: python stocks.py  # Or python stocks.py --refresh 300 if you want custom args

      - name: Commit and push updated dashboards (optional)
        if: success()  # Only if the script ran successfully
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.html
          git commit -m "Update dashboards $(date -u)" || exit 0
          git push
