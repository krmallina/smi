name: Update Stock Dashboard

on:
  schedule:
    - cron: '0 0,12-23 * * 1-6'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # CRITICAL: Without this, git pull --rebase WILL fail
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install yfinance pandas requests; fi

      - name: Run stocks.py
        run: python stocks.py --refresh 30

      - name: Push changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/*.html
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Update dashboards $(date -u)"

          # STRATEGY: Try to pull and rebase. 
          # If a conflict occurs in the HTML files, we assume the newest run is the best one.
          for i in {1..5}; do
            echo "Attempt $i: Syncing and pushing..."
            git pull --rebase -X theirs origin main && git push origin main && break || \
            (echo "Conflict detected, retrying..." && sleep 5)
          done
