name: Update Stock Dashboard

on:
  schedule:
    # 4 AM - 4 PM PST on Weekdays (Monday - Friday)
    # UTC is 8 hours ahead: 12:00 UTC to 00:00 UTC
    # We use 1-6 to cover the UTC shift for Friday afternoon PST
    - cron: '0 0,12-23 * * 1-6'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Crucial: Allows git to see history for rebasing

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          else 
            pip install yfinance pandas requests
          fi

      - name: Run stocks.py
        run: python stocks.py --refresh 30

      - name: Commit and push updated dashboards
        if: success()
        run: |
          # 1. Identity setup
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Stage the specific dashboard files
          git add data/*.html
          
          # 3. Check for changes
          if git diff --staged --quiet; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi
          
          # 4. Commit changes
          git commit -m "Update dashboards $(date -u)"
          
          # 5. THE ULTIMATE FIX: Retry loop for Push/Pull conflicts
          # This tries up to 5 times to sync and push if the repo changed mid-run
          for i in {1..5}; do
            echo "Attempt $i to push changes..."
            git pull --rebase origin main && git push origin main && break || \
            echo "Conflict detected. Retrying in 5 seconds..."
            sleep 5
          done
